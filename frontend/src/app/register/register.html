<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4">
  <div class="max-w-md w-full space-y-6 bg-white p-8 rounded-xl shadow-md border border-gray-100">
    <div class="text-center">
      <h2 class="text-3xl font-extrabold text-gray-900">Sign Up</h2>
      <p class="mt-2 text-sm text-gray-600">Enter details to create your account</p>
    </div>

    <form class="space-y-4" [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div *ngIf="errorMessage()" class="bg-red-50 text-red-700 text-sm p-3 rounded border border-red-200">
        {{ errorMessage() }}
      </div>

      <div>
        <label for="username" class="block text-sm font-medium text-gray-700">Username</label>
        <input id="username" type="text" formControlName="username"
          class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm" />
      </div>

      <div>
        <label for="email" class="block text-sm font-medium text-gray-700">Email Address</label>
        <input id="email" type="email" formControlName="email"
          class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm" />
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
        <input id="password" type="password" formControlName="password"
          class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm" />
      </div>

      <button type="submit" [disabled]="registerForm.invalid" [disabled]="isRegistering()"
        class="w-full flex justify-center py-2 px-4 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-md disabled:bg-gray-300 disabled:cursor-not-allowed">
         {{ isRegistering() ? 'Registering' : 'Register' }}
      </button>
    </form>

    <p class="text-center text-sm text-gray-600">
      Already have an account? <a routerLink="/login" class="text-blue-600 hover:underline">Log In</a>
    </p>
  </div>
</div>
